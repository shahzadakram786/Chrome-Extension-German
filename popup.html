<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 250px; padding: 15px; font-family: sans-serif; background: #1a1a1a; color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        select { width: 100%; background: #333; color: white; border: 1px solid #444; padding: 8px; margin-bottom: 10px; border-radius: 4px; }
        .label { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #00ffcc; }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin:0; font-size:14px; color:#ffcc00;">Universal Translator</h3>
        <label class="switch"><input type="checkbox" id="statusToggle"><span class="slider"></span></label>
    </div>
    <label class="label">FROM</label>
    <select id="sourceLangSelect">
        <option value="auto">✨ Auto-Detect</option>
        <option value="de">German</option>
        <option value="ar">Arabic</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
    </select>
    <label class="label">TO</label>
    <select id="targetLangSelect">
        <option value="en">English</option>
        <option value="ur">Urdu</option>
        <option value="es">Spanish</option>
        <option value="tr">Turkish</option>
    </select>
    <script src="popup.js"></script>
</body>
</html>
